<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#10232e" />
    <title>近邻 | 城市公共设施检索</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="近邻首页"><span class="brand-seal">近</span><span>近邻</span></a>
      <a class="repo-link" href="https://github.com/holynova/shanghai-public-facilities" target="_blank" rel="noreferrer">GitHub</a>
    </header>

    <main>
      <section class="search-deck" aria-labelledby="page-title">
        <div class="search-copy">
          <h1 id="page-title">找附近</h1>
          <p>选择城市，输入地址，查看每类最近地点。</p>
          <div id="city-switch" class="city-switch" role="group" aria-label="选择城市">
            <button type="button" data-city="shanghai" aria-pressed="true">上海</button>
            <button type="button" data-city="beijing" aria-pressed="false">北京</button>
          </div>
        </div>
      </section>
      <form id="address-form" class="address-form" novalidate>
          <label for="address">城市地址</label>
        <div class="input-row">
          <input id="address" name="address" autocomplete="street-address" placeholder="例如：人民公园" maxlength="200" required />
          <button type="submit" aria-label="开始查询">
            <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="10.5" cy="10.5" r="5.5"></circle><path d="m15 15 4.5 4.5"></path></svg>
          </button>
        </div>
      </form>
      <section class="search-extras" aria-label="快速定位与搜索历史">
        <button id="current-location" class="location-action" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s6-4.2 6-10a6 6 0 1 0-12 0c0 5.8 6 10 6 10Z"></path><circle cx="12" cy="11" r="2"></circle></svg>
          <span>使用当前位置</span>
        </button>
        <div id="search-history" class="search-history" hidden>
          <p>最近搜索</p>
          <div id="history-items" class="history-items"></div>
        </div>
      </section>

      <section class="results" id="results" aria-live="polite" aria-busy="false">
        <div class="result-bar">
          <h2>最近地点</h2>
          <p id="status">正在加载地点目录</p>
        </div>
        <div class="results-layout">
          <div id="score-content" hidden></div>
          <nav id="category-nav" class="category-nav" aria-label="结果类别导航" hidden></nav>
          <div id="result-content" class="empty-state">
            <h3>加载地点目录中</h3>
            <p>目录加载完成后即可搜索地址。</p>
          </div>
        </div>
      </section>
    </main>

    <footer id="data-note">数据目录：GCJ-02 坐标 · 距离为直线距离，仅供出行初筛</footer>
    <dialog id="share-dialog" class="share-dialog" aria-labelledby="share-title">
      <article class="share-card">
        <button id="share-close" class="dialog-close" type="button" aria-label="关闭分享卡片">×</button>
        <p id="share-kicker" class="share-kicker">上海公共设施近邻检索</p>
        <h2 id="share-title">附近设施概览</h2>
        <p id="share-address" class="share-address"></p>
        <p class="share-score"><strong id="share-score">--</strong><span>/ 100 综合便利度</span></p>
        <div id="share-dimensions" class="share-dimensions" aria-label="评分明细"></div>
        <img id="share-qr" class="share-qr" alt="项目链接二维码" width="180" height="180" />
        <a id="share-link" class="share-link" href="./" target="_blank" rel="noreferrer"></a>
        <div class="share-actions">
          <button id="native-share" class="share-primary" type="button">系统分享</button>
          <button id="copy-share" class="share-secondary" type="button">复制项目链接</button>
        </div>
        <p id="share-feedback" class="share-feedback" aria-live="polite"></p>
      </article>
    </dialog>
    <script src="amap-config.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
